<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Tracking Wireframe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; color: #333; }

    .container { max-width: 900px; margin: 0 auto; }

    /* ===== HEADER BAR ===== */
    .header {
      display: flex;
      align-items: stretch;
      border: 2px solid #555;
      background: #fff;
      margin-bottom: 24px;
    }
    .header-title {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      display: flex;
      align-items: center;
    }
    .header-stats {
      display: flex;
    }
    .header-stat {
      border-left: 2px solid #555;
      padding: 8px 16px;
      text-align: center;
      min-width: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .header-stat .label {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .header-stat .value {
      font-size: 14px;
      font-weight: bold;
    }
    .btn-add {
      border-left: 2px solid #555;
      background: #444;
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      min-width: 80px;
      text-align: center;
      line-height: 1.3;
    }

    /* ===== GOAL ROWS ===== */
    .goal-row {
      display: flex;
      align-items: stretch;
      border: 2px solid #ccc;
      background: #fff;
      margin-bottom: 12px;
    }
    .goal-type {
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      border-right: 2px solid #ccc;
      padding: 14px 8px;
    }
    .goal-name {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      color: #888;
      padding: 14px 16px;
    }
    .goal-check {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
    }
    .checkbox {
      width: 28px;
      height: 28px;
      background: #bbb;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }
    .goal-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      padding: 0 16px;
      min-width: 60px;
    }
    .goal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
    }
    .btn {
      background: #444;
      color: #fff;
      border: none;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ===== TOTAL ===== */
    .total {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 8px;
      padding-right: 180px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="header-title">[Your Name] Goal Tracking</div>
      <div class="header-stats">
        <div class="header-stat">
          <span class="label">Daily</span>
          <span class="value">1/1</span>
        </div>
        <div class="header-stat">
          <span class="label">Weekly</span>
          <span class="value">1/3</span>
        </div>
        <div class="header-stat">
          <span class="label">Monthly</span>
          <span class="value">0/1</span>
        </div>
      </div>
      <div class="btn-add">ADD<br>GOAL</div>
    </div>

    <!-- DAILY ROW -->
    <div class="goal-row">
      <div class="goal-type">Daily</div>
      <div class="goal-name">Goal</div>
      <div class="goal-check"><div class="checkbox">✓</div></div>
      <div class="goal-progress">3/7</div>
      <div class="goal-actions">
        <button class="btn">Edit</button>
        <button class="btn">Del</button>
      </div>
    </div>

    <!-- WEEKLY ROW -->
    <div class="goal-row">
      <div class="goal-type">Weekly</div>
      <div class="goal-name">Goal</div>
      <div class="goal-check"><div class="checkbox">✓</div></div>
      <div class="goal-progress">1/1</div>
      <div class="goal-actions">
        <button class="btn">Edit</button>
        <button class="btn">Del</button>
      </div>
    </div>

    <!-- MONTHLY ROW -->
    <div class="goal-row">
      <div class="goal-type">Monthly</div>
      <div class="goal-name">Goal</div>
      <div class="goal-check"><div class="checkbox">✓</div></div>
      <div class="goal-progress">0/1</div>
      <div class="goal-actions">
        <button class="btn">Edit</button>
        <button class="btn">Del</button>
      </div>
    </div>

    <!-- TOTAL -->
    <div class="total">2/3</div>

  </div>

</body>
</html>
